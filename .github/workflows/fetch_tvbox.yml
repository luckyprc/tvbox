name: Fetch TVBox JSON

on:
  schedule:
    - cron: '0 3 * * *'  # 每天 03:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install requests
        run: pip install requests

      - name: Fetch latest TVBox JSON
        run: python fetch_tvbox.py

      - name: Commit and push list.json
        run: |
          if [ -f list.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add list.json
            git commit -m "Update list.json with latest 10 TVBox sources" || echo "No changes to commit"
            git push
          else
            echo "list.json 文件不存在，跳过提交。"
          fi

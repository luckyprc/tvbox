name: Fetch TVBox JSON

on:
  schedule:
    # 每天凌晨 2 点自动运行
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Fetch latest TVBox JSON
        run: python fetch_tvbox.py

      - name: Commit and push list.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add list.json
          git commit -m "Update list.json with latest 10 TVBox sources" || echo "No changes to commit"
          git push

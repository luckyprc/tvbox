name: Fetch TVBox JSON

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install requests
        run: pip install requests

      - name: Fetch and merge TVBox sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python fetch_tvbox.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          has_changes=0

          for file in tvbox_merged.json list.json index.html; do
            if [ -f "$file" ]; then
              git add "$file"
              has_changes=1
              echo "✅ $file 准备提交"
            fi
          done

          if [ "$has_changes" -eq 1 ]; then
            git commit -m "Update TVBox sources: merge & ad-block" || echo "No changes to commit"
            git push
          else
            echo "⚠️ 没有文件生成，跳过提交"
          fi
